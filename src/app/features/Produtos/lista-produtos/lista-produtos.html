@for (item of produtos(); track item){
    <app-produto 
    [nome]="item.nome"
     [preco]="item.preco"
     (produtoSelecionado)="exibirProduto($event)"
     >
    </app-produto>

}
<p><button (click)="adicionarProduto()">Adicionar Produto

</button></p>

<p>Total de produtos: {{ totalProdutos() }}</p>

<p>Valor total: {{ valorTotal()|precoFormatado }}</p>
<p><button (click)="subtituirProdutos()">Substituir Produtos</button></p>
